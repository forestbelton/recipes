name: Fennel Gratin
source: https://www.foodnetwork.com/recipes/food-network-kitchen/fennel-gratin-recipe-1928389
prep_time_minutes: 15
cook_time_minutes: 60
additional_time_minutes: 0
servings: 6
ingredients:
  - name: butter
    amount: 1/2
    unit: tbsp
  - name: fennel, thinly sliced
    amount: 2
    unit: heads
  - name: coarsely grated parmesan
    amount: 1
    unit: cups
  - name: garlic, minced
    amount: 1
    unit: cloves
  - name: kosher salt
    amount: 1/4
    unit: tsp
  - name: mustard
    amount: 1
    unit: tbsp
  - name: heavy cream
    amount: 2
    unit: cups
steps:
  - Preheat the oven to 350 degrees F.
  - Butter a 9 by 13-inch baking dish.
  - Add the fennel, Parmesan, garlic, and 1/4 teaspoon salt and toss to combine.
  - Whisk the mustard into the heavy cream and pour over the fennel mixture.
  - Bake until bubbling and golden, about 1 hour.
